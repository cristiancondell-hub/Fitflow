<html lang="es">
<head>

  <title>FitFlow en pausa</title>

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;

      align-items:center;

      padding:24px;

    .box{max-width:520px}
    h1{font-size:24px;margin:0 0 12px}
    p{font-size:16px;line-height:1.45;margin:0 0 10px}

<body>
  <div class="box">
    <h1>FitFlow en pausa momentanea</h1>
    <p>Estamos realizando una mantencion breve.</p>

  </div>

</html>
